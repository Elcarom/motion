name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repository:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate repository metadata and assets
        run: |
          python3 tools/validate_repository.py
          python3 tools/branding_audit.py
          find tools tests -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

  format:
    name: clang-format
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - run: pacman -Syu --noconfirm --needed git clang
      - uses: actions/checkout@v4
      - name: Check C/C++ formatting
        run: |
          mapfile -d '' files < <(find src tests -type f \( -name '*.cpp' -o -name '*.h' \) -print0)
          clang-format --dry-run -Werror "${files[@]}"

  native:
    name: Native ${{ matrix.mode }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        mode: [debug, release]
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git meson ninja just pkgconf clang \
            wayland wayland-protocols libglvnd freetype2 fontconfig cairo pango harfbuzz \
            libxkbcommon glib2 sdbus-cpp libpipewire wireplumber polkit pam curl libwebp \
            librsvg libqalculate libxml2 md4c tomlplusplus nlohmann-json stb jemalloc
      - uses: actions/checkout@v4
      - name: Configure
        run: just configure ${{ matrix.mode }}
      - name: Build
        run: just build ${{ matrix.mode }}
      - name: Test
        run: just test ${{ matrix.mode }} --print-errorlogs
      - name: Static analysis
        if: matrix.mode == 'debug'
        run: just lint debug
      - name: Stage installation
        if: matrix.mode == 'release'
        run: DESTDIR="$PWD/stage" meson install --no-rebuild -C build-release
      - name: Verify installed layout
        if: matrix.mode == 'release'
        run: |
          test -x stage/usr/local/bin/motion
          test -L stage/usr/local/bin/noctalia
          test -f stage/usr/local/share/motion/assets/translations/en.json
          test -f stage/usr/local/share/applications/dev.motion.Motion.desktop
          test -f stage/usr/local/share/icons/hicolor/scalable/apps/motion.svg

  sanitizers:
    name: ASan and UBSan
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git meson ninja just pkgconf clang \
            wayland wayland-protocols libglvnd freetype2 fontconfig cairo pango harfbuzz \
            libxkbcommon glib2 sdbus-cpp libpipewire wireplumber polkit pam curl libwebp \
            librsvg libqalculate libxml2 md4c tomlplusplus nlohmann-json stb jemalloc
      - uses: actions/checkout@v4
      - run: just configure asan
      - run: just test asan --print-errorlogs
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

